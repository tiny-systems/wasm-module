name: Build & publish module to the Tiny Systems

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'
      - name: Build and publish
        env:
          MODULE_NAME: ${{ github.event.repository.name }}
          MODULE_VERSION: ${{ github.ref_name }}
          MODULE_FULL: github.com/${{ github.repository }}
          DEV_KEY: ${{ secrets.TINY_DEV_SECRET }}
        run: |
          echo "Preparing a release"
          echo "Module name: $MODULE_NAME"
          # Strip any local replace directives — only used during local dev.
          sed -i '/replace github.com\/tiny-systems\/module =>/d' go.mod
          go mod tidy
          go test ./...
          go run cmd/main.go tools build --version "$MODULE_VERSION" --name "$MODULE_FULL" --devkey "$DEV_KEY"

      - name: Notify e2e
        if: success()
        env:
          MODULE_NAME: ${{ github.event.repository.name }}
          MODULE_VERSION: ${{ github.ref_name }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.E2E_DISPATCH_TOKEN }}
          repository: tiny-systems/e2e
          event-type: module-released
          client-payload: '{"module":"${{ env.MODULE_NAME }}","version":"${{ env.MODULE_VERSION }}"}'
